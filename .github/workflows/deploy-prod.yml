name: Deploy Produção (PROD)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar Clasp
        run: npm install -g @google/clasp

      - name: Autenticar Clasp
        run: echo '${{ secrets.CLASP_CREDENTIALS }}' > ~/.clasprc.json

      - name: Configurar .clasp.json para PROD
        run: |
          echo '{
            "scriptId": "${{ secrets.SCRIPT_ID_PROD }}",
            "rootDir": ""
          }' > .clasp.json

      - name: Push para o Apps Script (PROD)
        run: clasp push --force
