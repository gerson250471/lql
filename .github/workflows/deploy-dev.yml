name: Deploy Homologação (DEV)

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar Clasp
        run: npm install -g @google/clasp

      - name: Autenticar Clasp
        run: echo '${{ secrets.CLASP_CREDENTIALS }}' > ~/.clasprc.json

      - name: Configurar .clasp.json para DEV
        run: |
          echo '{
            "scriptId": "${{ secrets.SCRIPT_ID_DEV }}",
            "rootDir": ""
          }' > .clasp.json

      - name: Push para o Apps Script (DEV)
        run: clasp push --force
